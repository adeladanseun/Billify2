<div class="calendar-controls">
    <button onclick="changeView(-1)">&#10094; Previous</button>
    <h2 id="view-label">Current View</h2>
    <button onclick="changeView(1)">Next &#10095;</button>
</div>

<div class="calendar-wrapper">
    <div id="prev-month" class="month-container"></div>
    <div id="curr-month" class="month-container"></div>
    <div id="next-month" class="month-container"></div>
</div>

<style>
.calendar-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    margin-bottom: 20px;
}

button {
    padding: 8px 16px;
    cursor: pointer;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
}

button:hover {
    background-color: #0056b3;
}

/* Ensure the wrapper stacks on small screens */
@media (max-width: 800px) {
    .calendar-wrapper {
        flex-direction: column;
        align-items: center;
    }
}

</style>

<script>
// This tracks the "Middle" month of our 3-month view
let baseDate = new Date();

function renderThreeMonths() {
    const year = baseDate.getFullYear();
    const month = baseDate.getMonth();

    // Update the header label
    document.getElementById('view-label').innerText = `${baseDate.toLocaleString('default', { month: 'long' })} ${year}`;

    // Render the three months
    generateCalendar('prev-month', new Date(year, month - 1, 1));
    generateCalendar('curr-month', new Date(year, month, 1));
    generateCalendar('next-month', new Date(year, month + 1, 1));
}

function changeView(direction) {
    // Moves the view by 3 months forward or backward
    baseDate.setMonth(baseDate.getMonth() + (direction * 3));
    renderThreeMonths();
}

function generateCalendar(targetId, date) {
    const container = document.getElementById(targetId);
    const year = date.getFullYear();
    const month = date.getMonth();
    const monthName = date.toLocaleString('default', { month: 'long' });
    
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    let html = `<div class="header">${monthName} ${year}</div>`;
    html += `<div class="calendar-grid">`;
    
    ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(d => {
        html += `<div class="day-name">${d}</div>`;
    });

    for (let i = 0; i < firstDay; i++) {
        html += `<div class="day"></div>`;
    }

    const today = new Date();
    for (let day = 1; day <= daysInMonth; day++) {
        const isToday = today.getDate() === day && 
                        today.getMonth() === month && 
                        today.getFullYear() === year;
        html += `<div class="day ${isToday ? 'today' : ''}">${day}</div>`;
    }

    html += `</div>`;
    container.innerHTML = html;
}

// Initial Call
renderThreeMonths();

</script>
