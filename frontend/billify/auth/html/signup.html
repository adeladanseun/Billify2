<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billify - Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="../../css/common.css"/>
    <link rel="stylesheet" href="../css/auth.css"/>
    <script src="/js/essential.js"> </script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <h1><i class="fas fa-receipt"></i> Billify</h1>
                </div>
                <p>Create your management account</p>
            </div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>User Name</label>
                    <input type="text" id="username" class="form-control" required placeholder="John Doe">
                </div>
                <!-- <div class="form-group">
                    <label>Business Name</label>
                    <input type="text" id="business" class="form-control" required placeholder="Billify Inc.">
                </div> -->
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary auth-btn">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <!-- <script src="js/common.js"></script> -->
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Your API registration logic here...\
            const payload = {
                username: e.target.username.value,
                //business: e.target.business.value,
                email: e.target.email.value,
                password: e.target.password.value
            };
            try {
                const response = await fetch(`${DOMAIN}/user/api/register/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    alert('Registration failed. Please check your details and try again.');
                    throw new Error(data.message || 'Registration failed');
                    return;
                }

                window.location.href = '/auth/html/login.html';

            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while creating your account. Please try again.');
                return;
            }


            alert('Account created! Please login.');
            window.location.href = '/auth/html/login.html';
        });
    </script>
</body>
</html>
